name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify schema bundle
        run: make schema-verify

      - name: Verify project
        run: make verify

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          for target in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            set -- $target
            os="$1"
            arch="$2"
            out_dir="dist/mobius_${VERSION}_${os}_${arch}"
            mkdir -p "$out_dir"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X github.com/sohooo/moebius/internal/buildinfo.Version=${VERSION} -X github.com/sohooo/moebius/internal/buildinfo.Commit=${COMMIT} -X github.com/sohooo/moebius/internal/buildinfo.Date=${BUILD_DATE}" \
              -o "$out_dir/mobius" ./cmd/mobius
            tar -C "$out_dir" -czf "${out_dir}.tar.gz" mobius
            rm -rf "$out_dir"
          done
          shasum -a 256 dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  container:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build date
        id: meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Smoke test container image
        run: |
          docker build \
            --build-arg MOBIUS_VERSION=${{ github.ref_name }} \
            --build-arg MOBIUS_COMMIT=${{ github.sha }} \
            --build-arg MOBIUS_BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -t mobius:test .
          docker run --rm mobius:test version
          docker run --rm mobius:test diff --help >/dev/null

      - name: Publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/sohooo/moebius:${{ github.ref_name }}
          build-args: |
            MOBIUS_VERSION=${{ github.ref_name }}
            MOBIUS_COMMIT=${{ github.sha }}
            MOBIUS_BUILD_DATE=${{ steps.meta.outputs.build_date }}
